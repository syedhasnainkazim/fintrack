databases:
  - name: fintrack-db
    databaseName: fintrack
    user: fintrack
    plan: free

services:
  - type: web
    name: fintrack
    env: node
    buildCommand: bash build.sh
    startCommand: NODE_ENV=production node server/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DATABASE_URL
        fromDatabase:
          name: fintrack-db
          property: connectionString
